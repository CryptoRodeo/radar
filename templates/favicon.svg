<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <!-- <rect width="100" height="100" fill="#000000"/> -->

  <!-- Radar circles -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#CC0000" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#CC0000" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#CC0000" stroke-width="1" opacity="0.5"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#CC0000" stroke-width="1" opacity="0.6"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#CC0000"/>

  <!-- Radar sweep line -->
  <line x1="50" y1="50" x2="50" y2="8" stroke="#CC0000" stroke-width="2" opacity="0.8"/>

  <!-- Blips (dots on the radar) -->
  <circle cx="65" cy="30" r="2.5" fill="#FFFFFF"/>
  <circle cx="35" cy="40" r="2.5" fill="#FFFFFF"/>
  <circle cx="60" cy="55" r="2.5" fill="#FFFFFF"/>
  <circle cx="40" cy="65" r="2.5" fill="#FFFFFF"/>
</svg>
